{% extends 'base.html' %}
{% block title %}Editar Perfil{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        {% if messages %}
        <div class="messages mt-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Editar Perfil</h4>
                <h5 class="card-subtitle mb-5">Atualize seus dados e foto de perfil</h5>

                <form action="{% url 'editar_perfil' %}" method="post" enctype="multipart/form-data" class="form-horizontal form-material mx-2">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="foto">Foto de Perfil</label>
                        <input type="file" class="form-control" id="foto" name="foto" accept="image/*">
                        {% if profile.foto %}
                        <img src="{{ profile.foto.url }}" alt="Foto de Perfil" width="100" class="mt-2">
                        {% endif %}
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-control form-control-line" value="{{ profile.nome }}" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control form-control-line" value="{{ user.username }}" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control form-control-line" value="{{ user.email }}" required>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-success text-white">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
